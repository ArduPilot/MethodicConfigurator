version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Europe/Lisbon
    cooldown:
      default-days: 14
    commit-message:
      prefix: deps
      include: scope
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Europe/Lisbon
    cooldown:
      default-days: 14
    commit-message:
      prefix: ci
      include: scope
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Europe/Lisbon
    cooldown:
      default-days: 14
    commit-message:
      prefix: ci
      include: scope
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      docker-all:
        patterns:
          - "*"
